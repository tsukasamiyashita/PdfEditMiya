name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # Python環境のセットアップ（安定した3.11を使用）
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # 必要なライブラリのインストール
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # requirements.txt から ezdxf と PyQt6 をインストール
        pip install -r requirements.txt
        # exe化ツールのインストール
        pip install pyinstaller

    # PyInstallerでexe化の実行
    - name: Build with PyInstaller
      run: >
        pyinstaller 
        --onefile 
        --noconsole 
        --clean 
        --name "PdfEditMiya-v1.10.0" 
        --add-data "README.md;."
        --collect-all PyQt6
        app.pyw

    # 完成したexeファイルをGitHub上にアップロード
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: PdfEditMiya-v1.10.0
        path: dist/PdfEditMiya-v1.10.0.exe